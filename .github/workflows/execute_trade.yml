name: execute_trade

on:
  workflow_dispatch:
    inputs:
      trade_id:
        description: "Trade ID to dry-run"
        required: true
        type: string

jobs:
  execute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Dry run trade revalidation
        run: python -m src.jobs.executor "${{ github.event.inputs.trade_id }}"
        env:
          PORTFOLIO_GS_CREDS: ${{ secrets.PORTFOLIO_GS_CREDS }}
          IOL_USERNAME: ${{ secrets.IOL_USERNAME }}
          IOL_PASSWORD: ${{ secrets.IOL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BROKER_FEE_PCT: "0.5"
          WATCH_MIN_DIFF_PCT: "1.0"
          WATCH_MIN_NET_USD_PER_CEDEAR: "0.12"
          MIN_EXEC_QTY: "5"